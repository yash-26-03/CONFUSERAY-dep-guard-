name: dep-guard scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -e .

      - run: |
          depguard scan . \
            --config depguard.config.json \
            --report-md report.md \
            --report-json report.json \
            --fail-on high

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: depguard-report
          path: |
            report.md
            report.json
